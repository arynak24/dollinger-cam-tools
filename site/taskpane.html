<div id="camWorkspace">

  <!-- CLAUSE VERBIAGE -->
  <section class="panel">
    <h2>Clause Verbiage</h2>
    <textarea id="clauseText" placeholder="Paste clause text here…" class="big-text"></textarea>
  </section>

  <!-- ABSTRACTION NOTES -->
  <section class="panel">
    <h2>Abstraction Notes</h2>
    <textarea id="abstractionNotes" placeholder="Interpretation, key points, exceptions…" class="medium-text"></textarea>
  </section>

  <!-- EXTRACTED VALUES -->
  <section class="panel">
    <h2>Extracted Values</h2>

    <div class="field">
      <label>Dollar Amount(s)</label>
      <input type="text" id="valueDollars" placeholder="e.g., $2.50, $0.25/sf, etc." />
    </div>

    <div class="field">
      <label>Percent / Fee</label>
      <input type="text" id="valuePercent" placeholder="e.g., 5% admin fee" />
    </div>

    <div class="field">
      <label>Base Year</label>
      <input type="text" id="valueBaseYear" placeholder="e.g., 2025" />
    </div>

    <div class="field">
      <label>Date Range / Time Period</label>
      <input type="text" id="valueDates" placeholder="e.g., 1/1/2025 - 12/31/2025" />
    </div>

    <div class="field">
      <label>Other Key Values</label>
      <input type="text" id="valueOther" placeholder="thresholds, caps, special conditions" />
    </div>
  </section>

  <!-- CATEGORY + TAGS -->
  <section class="panel">
    <h2>Category & Tags</h2>

    <div class="field">
      <label>CAM Category</label>
      <select id="camCategory">
        <option value="">Select Category</option>
        <option>Operating Expenses</option>
        <option>Taxes</option>
        <option>Insurance</option>
        <option>Utilities</option>
        <option>Capital Expenditures</option>
        <option>Admin/Management Fees</option>
        <option>Exclusions</option>
      </select>
    </div>

    <div class="field">
      <label>Tags</label>
      <input type="text" id="camTags" placeholder="comma-separated tags" />
    </div>

    <div class="field">
      <label>PDF Page Reference</label>
      <input type="text" id="pdfPage" placeholder="Where is this clause in the lease PDF?" />
    </div>

  </section>

  <!-- ACTION BUTTONS -->
  <section class="panel actions">
    <button id="btnSaveClause" class="primary">Save Clause to Repository</button>
    <button id="btnMatchClause">Match Existing Clause</button>
    <button id="btnInsertID">Insert ClauseID into TenantForm</button>
  </section>

  <!-- HISTORY PANEL -->
  <section class="panel">
    <h2>Clause History / Review</h2>
    <div id="historyContent" class="history-box">
      <p>No clause loaded.</p>
    </div>
  </section>

</div>
